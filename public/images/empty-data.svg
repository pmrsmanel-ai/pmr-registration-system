<svg xmlns="http://www.w3.org/2000/svg" width="600" height="500" viewBox="0 0 600 500">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FEE2E2"></stop>
      <stop offset="100%" stop-color="#FFFFFF"></stop>
    </linearGradient>
  </defs>

  <rect width="600" height="500" rx="30" fill="url(#bg)"></rect>

  <!-- Shadow -->
  <ellipse cx="300" cy="410" rx="120" ry="18" fill="#E5E7EB"></ellipse>

  <!-- Clipboard -->
  <rect x="190" y="90" width="220" height="270" rx="20" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="4"></rect>

  <rect x="250" y="65" width="100" height="40" rx="12" fill="#D62828"></rect>

  <!-- Cross -->
  <rect x="285" y="165" width="30" height="90" rx="6" fill="#D62828"></rect>
  <rect x="255" y="195" width="90" height="30" rx="6" fill="#D62828"></rect>

  <!-- Lines -->
  <rect x="235" y="285" width="130" height="12" rx="6" fill="#E5E7EB"></rect>
  <rect x="220" y="315" width="160" height="12" rx="6" fill="#F3F4F6"></rect>

  <!-- Magnifier -->
  <circle cx="430" cy="325" r="48" fill="#FFFFFF" stroke="#D62828" stroke-width="8"></circle>
  <line x1="465" y1="360" x2="510" y2="405" stroke="#D62828" stroke-width="10" stroke-linecap="round"></line>

  <!-- X -->
  <line x1="410" y1="305" x2="450" y2="345" stroke="#D62828" stroke-width="8" stroke-linecap="round"></line>
  <line x1="450" y1="305" x2="410" y2="345" stroke="#D62828" stroke-width="8" stroke-linecap="round"></line>

  <!-- Text -->
  <text x="300" y="455" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#374151">
    Belum Ada Data
  </text>

  <text x="300" y="485" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#6B7280">
    Data pendaftar akan muncul di sini
  </text>

</svg>